<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無立場台灣政治事件紀錄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
            /* 背景改為深色漸層 */
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            /* 容器背景改為深灰色 */
            background: #1a1a1a;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #333;
        }

        header {
            /* Header 漸層改為較深邃的紫色 */
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            color: white;
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.8;
        }

        .actions {
            padding: 30px 40px;
            background: #252525;
            border-bottom: 2px solid #333;
        }

        .filter-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-box label {
            font-size: 13px;
            color: #aaa;
            font-weight: 600;
        }

        .filter-box select {
            padding: 10px 15px;
            background: #333;
            border: 2px solid #444;
            border-radius: 10px;
            font-size: 15px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }

        .filter-box select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
        }

        .reset-btn {
            padding: 10px 20px;
            background: #444;
            color: #ccc;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            align-self: flex-end;
        }

        .reset-btn:hover {
            background: #555;
            color: #fff;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: #333;
            border: 2px solid #444;
            border-radius: 10px;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .add-event-btn {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
            color: white;
            border: 1px solid #555;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .add-event-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            filter: brightness(1.2);
        }

        /* 統計欄位改為深色帶點金屬感 */
        .stats {
            padding: 20px 40px;
            background: #1e1e1e;
            border-bottom: 2px solid #333;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #bb86fc; /* 淺紫色，深色模式的經典強調色 */
        }

        .stat-label {
            color: #999;
            font-size: 14px;
        }

        .table-container {
            padding: 40px;
            background: #1a1a1a;
            overflow-x: auto;
        }

        thead {
            background: #333;
            color: #bb86fc;
        }

        th {
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            border-bottom: 2px solid #444;
        }

        tbody tr {
            background: #1a1a1a;
            transition: all 0.3s;
            border-bottom: 1px solid #2a2a2a;
        }

        tbody tr:hover {
            background: #252525;
        }

        td {
            padding: 20px;
            font-size: 15px;
            color: #ccc;
        }

        .date-cell {
            font-weight: 600;
            color: #bb86fc;
            white-space: nowrap;
        }

        .event-cell {
            line-height: 1.6;
            color: #ddd;
        }

        .source-link {
            color: #03dac6; /* 湖水綠，深色模式中醒目的連結色 */
            text-decoration: none;
            font-weight: 500;
        }

        .source-link:hover {
            text-decoration: underline;
            filter: brightness(1.2);
        }

        footer {
            background: #111;
            padding: 30px 40px;
            text-align: center;
            color: #666;
            border-top: 1px solid #333;
        }
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.8em;
            }

            .table-container {
                padding: 20px;
            }

            th, td {
                padding: 12px;
                font-size: 14px;
            }

            .actions {
                padding: 20px;
            }

            .controls-row {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group {
                width: 100%;
                justify-content: space-between;
            }

            .add-event-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇹🇼 無立場台灣政治事件紀錄</h1>
            <p class="subtitle">拒絕集體健忘！<br>我就好奇！他們這些領我薪水的人，每天在幹嘛！？</p>
        </header>

        <div class="actions">
            <div class="controls-row">
                <div class="filter-group">
                    <div class="filter-box">
                        <label>年份</label>
                        <select id="yearFilter">
                            <option value="">全部年份</option>
                        </select>
                    </div>
                    <div class="filter-box">
                        <label>月份</label>
                        <select id="monthFilter">
                            <option value="">全部月份</option>
                            <option value="01">1月</option>
                            <option value="02">2月</option>
                            <option value="03">3月</option>
                            <option value="04">4月</option>
                            <option value="05">5月</option>
                            <option value="06">6月</option>
                            <option value="07">7月</option>
                            <option value="08">8月</option>
                            <option value="09">9月</option>
                            <option value="10">10月</option>
                            <option value="11">11月</option>
                            <option value="12">12月</option>
                        </select>
                    </div>
                    <button class="reset-btn" id="resetBtn">🔄 重置篩選</button>
                </div>
                <a href="https://github.com/nillcheng/political-events-tw/issues/new?template=event.md" 
                   class="add-event-btn" 
                   target="_blank">
                    ➕ 新增事件
                </a>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜尋事件內容...">
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalEvents">0</span>
                <span class="stat-label">筆事件</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="displayedEvents">0</span>
                <span class="stat-label">筆符合篩選</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="latestYear">2026</span>
                <span class="stat-label">最新年份</span>
            </div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">⏳ 載入中...</div>
            
            <table id="eventsTable" style="display: none;">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>事件</th>
                        <th>來源</th>
                    </tr>
                </thead>
                <tbody id="eventsBody">
                </tbody>
            </table>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📋</div>
                <h3>找不到符合條件的事件</h3>
                <p>試試調整篩選條件或搜尋關鍵字</p>
            </div>
        </div>

        <footer>
            <p>本專案由社群維護 | 資料來源：<a href="https://github.com/nillcheng/political-events-tw" target="_blank">GitHub</a></p>
            <p style="margin-top: 10px; font-size: 12px;">所有事件由網友提供，不代表本站立場</p>
        </footer>
    </div>

    <script>
        // GitHub API 設定
        const GITHUB_OWNER = 'nillcheng';
        const GITHUB_REPO = 'political-events-tw';
        const API_URL = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/issues`;

        let allEvents = [];
        let filteredEvents = [];

        // 載入事件
        async function loadEvents() {
            try {
                const response = await fetch(`${API_URL}?state=open&labels=event&per_page=100`);
                const issues = await response.json();

                allEvents = issues
                    .map(issue => parseEvent(issue))
                    .filter(event => event !== null)
                    .sort((a, b) => new Date(b.date) - new Date(a.date));

                populateYearFilter();
                applyFilters();
                updateStats();
            } catch (error) {
                console.error('載入事件失敗:', error);
                document.getElementById('loading').innerHTML = '❌ 載入失敗，請重新整理頁面';
            }
        }

        // 解析事件資料
        function parseEvent(issue) {
            try {
                const body = issue.body || '';
                
                // 支援多種日期格式
                const dateMatch = body.match(/日期[：:]\s*(\d{4})\s*年?\s*(\d{1,2})\s*月?\s*(\d{1,2})?\s*日?/) ||
                                body.match(/年份[：:]\s*(\d{4})[\s\S]*?月份[：:]\s*(\d{1,2})/);
                
                const eventMatch = body.match(/事件[：:]\s*(.+?)(?:\n|$)/);
                const sourceMatch = body.match(/來源[：:]\s*(.+?)(?:\n|$)/);

                if (!dateMatch || !eventMatch) return null;

                const year = dateMatch[1];
                const month = dateMatch[2].padStart(2, '0');
                const day = dateMatch[3] ? dateMatch[3].padStart(2, '0') : '01';

                return {
                    date: `${year}-${month}-${day}`,
                    year: year,
                    month: month,
                    day: day,
                    event: eventMatch[1].trim(),
                    source: sourceMatch ? sourceMatch[1].trim() : '',
                    issueUrl: issue.html_url
                };
            } catch (error) {
                console.error('解析事件失敗:', error);
                return null;
            }
        }

        // 填充年份選項
        function populateYearFilter() {
            const years = [...new Set(allEvents.map(e => e.year))].sort((a, b) => b - a);
            const yearFilter = document.getElementById('yearFilter');
            
            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = `${year} 年`;
                yearFilter.appendChild(option);
            });
        }

        // 套用篩選
        function applyFilters() {
            const yearFilter = document.getElementById('yearFilter').value;
            const monthFilter = document.getElementById('monthFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            filteredEvents = allEvents.filter(event => {
                const matchYear = !yearFilter || event.year === yearFilter;
                const matchMonth = !monthFilter || event.month === monthFilter;
                const matchSearch = !searchTerm || 
                    event.event.toLowerCase().includes(searchTerm) ||
                    event.year.includes(searchTerm) ||
                    event.month.includes(searchTerm);
                
                return matchYear && matchMonth && matchSearch;
            });

            displayEvents(filteredEvents);
            updateStats();
        }

        // 顯示事件
        function displayEvents(events) {
            const loading = document.getElementById('loading');
            const table = document.getElementById('eventsTable');
            const emptyState = document.getElementById('emptyState');
            const tbody = document.getElementById('eventsBody');

            loading.style.display = 'none';

            if (events.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            table.style.display = 'table';

            tbody.innerHTML = events.map(event => {
                const dateStr = event.day && event.day !== '01' ? 
                    `${event.year} 年 ${event.month} 月 ${event.day} 日` : 
                    `${event.year} 年 ${event.month} 月`;
                
                return `
                    <tr>
                        <td class="date-cell">${dateStr}</td>
                        <td class="event-cell">${escapeHtml(event.event)}</td>
                        <td class="source-cell">
                            ${event.source ? 
                                (event.source.startsWith('http') ? 
                                    `<a href="${event.source}" class="source-link" target="_blank">查看來源</a>` : 
                                    escapeHtml(event.source)
                                ) : 
                                `<a href="${event.issueUrl}" class="source-link" target="_blank">GitHub</a>`
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 更新統計
        function updateStats() {
            document.getElementById('totalEvents').textContent = allEvents.length;
            document.getElementById('displayedEvents').textContent = filteredEvents.length;
            if (allEvents.length > 0) {
                document.getElementById('latestYear').textContent = allEvents[0].year;
            }
        }

        // HTML 跳脫
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 重置篩選
        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('yearFilter').value = '';
            document.getElementById('monthFilter').value = '';
            document.getElementById('searchInput').value = '';
            applyFilters();
        });

        // 篩選事件監聽
        document.getElementById('yearFilter').addEventListener('change', applyFilters);
        document.getElementById('monthFilter').addEventListener('change', applyFilters);
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // 初始化
        loadEvents();
    </script>
</body>
</html>
